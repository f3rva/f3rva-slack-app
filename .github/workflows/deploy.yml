name: CI / Build & Deploy

on:
  push:
    branches: [ main ]            # deploy to development on pushes to main
  release:
    types: [ published ]          # deploy to production when a release is published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest

  deploy-dev:
    needs: test
    environment: development
    permissions:
      contents: read
      id-token: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the Slack App code
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Set up Python for CDK execution and Lambda local bundling
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'infrastructure/requirements.txt'

      # 3. Install AWS CDK CLI globally
      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      # 4. Install Python CDK Dependencies
      - name: Install Python CDK Dependencies
        run: pip install -r requirements.txt
        working-directory: infrastructure

      # 5. Configure AWS credentials via OIDC
      - name: Configure AWS credentials (OIDC / role for dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      # 6. Deploy the Development Slack App CDK stack
      - name: Deploy CDK Dev Stack
        run: cdk deploy F3RVA-slack-app-dev --require-approval never
        working-directory: infrastructure
        env:
          F3RVA_ACCOUNT_DEV: ${{ secrets.F3RVA_ACCOUNT_DEV }}
          F3RVA_ACCOUNT_PROD: '000000000000'

  deploy-prod:
    needs: test
    environment: production
    permissions:
      contents: read
      id-token: write
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the Slack App code
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Set up Python for CDK execution and Lambda local bundling
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'infrastructure/requirements.txt'

      # 3. Install AWS CDK CLI globally
      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      # 4. Install Python CDK Dependencies
      - name: Install Python CDK Dependencies
        run: pip install -r requirements.txt
        working-directory: infrastructure

      # 5. Configure AWS credentials via OIDC
      - name: Configure AWS credentials (OIDC / role for prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      # 6. Deploy the Production Slack App CDK stack
      - name: Deploy CDK Prod Stack
        run: cdk deploy F3RVA-slack-app-prod --require-approval never
        working-directory: infrastructure
        env:
          F3RVA_ACCOUNT_DEV: '123456789012'
          F3RVA_ACCOUNT_PROD: ${{ secrets.F3RVA_ACCOUNT_PROD }}
